name: argos-edge

# Phase 7: Caddy + Argos panel + CrowdSec LAPI (bundled).
# argos-caddy image bundles the crowdsec-bouncer HTTP handler that reads
# decisions from the local LAPI at crowdsec:8081.

services:
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: argos-crowdsec
    restart: unless-stopped
    environment:
      # Installed at first boot. Pulls the caddy-logs parser + HTTP scenarios.
      - COLLECTIONS=crowdsecurity/base-http-scenarios crowdsecurity/http-cve
      # LAPI listens on :8081 (port 8080 is taken by argos-panel on the
      # host side; keeping both as 8081 avoids surprises in logs).
      - LOCAL_API_URL=http://0.0.0.0:8081
      # Let crowdsec run as a regular uid so it can read caddy_logs.
      - GID=1000
    volumes:
      - crowdsec_config:/etc/crowdsec
      - crowdsec_data:/var/lib/crowdsec/data
      # Read-only access to argos-caddy's JSON access.log + errors.log.
      - caddy_logs:/var/log/caddy:ro
      # Log acquisition pointer + listen-port override. Mounted read-only
      # so a crash-loop does not delete them.
      - ./crowdsec/acquis.yaml:/etc/crowdsec/acquis.yaml:ro
      - ./crowdsec/config.yaml.local:/etc/crowdsec/config.yaml.local:ro
      # AppSec (WAF inline) source files. Mounted under /setup/ rather
      # than /etc/crowdsec/acquis.d/ so crowdsec can boot cleanly on a
      # fresh install (before the appsec collections are available).
      # setup-appsec.sh installs the collections and copies the acquis
      # + appsec-configs files into the durable config volume;
      # subsequent restarts load them from /etc/crowdsec/ directly.
      - ./crowdsec/acquis.d:/setup/acquis.d:ro
      - ./crowdsec/appsec-configs:/setup/appsec-configs:ro
      - ./crowdsec/setup-appsec.sh:/setup-appsec.sh:ro
    expose:
      - "8081"
      # AppSec WAF endpoints. Only reachable from inside argos_net --
      # never published to the host. Caddy's bouncer talks to either:
      #   7422  crowdsecurity/appsec-default  (block mode -> 403)
      #   7423  argos/appsec-detect           (detect mode -> allow+log)
      # Mode swap at runtime flips the bouncer's appsec_url.
      - "7422"
      - "7423"
    networks:
      - argos_net
    healthcheck:
      test: ["CMD", "cscli", "lapi", "status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: ${CROWDSEC_MEM_LIMIT:-256m}
    cpus: ${CROWDSEC_CPU_LIMIT:-0.5}

  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    image: argos-caddy:phase1
    container_name: argos-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      # Shared with the argos panel so it can tail access.log and
      # errors.log. Caddy writes as root (files end up 0644, readable
      # to argos's nobody); argos mounts the same volume read-only.
      - caddy_logs:/var/log/caddy
    environment:
      # OPTIONAL. Only needed when some host uses TLS mode=dns01 with
      # the Cloudflare provider; HTTP-01 (the default for tls_mode=auto)
      # ignores it. Soft-default so `docker compose up` does not hard-
      # fail on a fresh install that has no Cloudflare credentials.
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:-}
      # Phase 7: passed through to the caddy-crowdsec-bouncer module.
      # Empty string = bouncer block is omitted from the generated JSON
      # (argos-panel is responsible for that), so caddy still boots.
      - CROWDSEC_BOUNCER_API_KEY=${CROWDSEC_BOUNCER_API_KEY:-}
    # umask 022 so the rotating access.log / errors.log files caddy
    # creates end up 0644 and the argos panel (running as nobody in
    # its own container) can read them via the shared caddy_logs volume.
    entrypoint: ["sh", "-c", "umask 022 && exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile"]
    networks:
      - argos_net
    depends_on:
      crowdsec:
        condition: service_healthy
    # Admin API en :2019 NO se publica al host. Solo accesible desde la red interna.
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2019/config/"]
      interval: 15s
      timeout: 5s
      retries: 3
    # Phase 9b resource limits. Tune via .env.
    mem_limit: ${CADDY_MEM_LIMIT:-256m}
    cpus: ${CADDY_CPU_LIMIT:-0.5}

  argos:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: argos-panel
    restart: unless-stopped
    # Phase 9b: by default the panel is reachable at http://<lan-ip>:8080
    # (LAN mode). To switch to behind_caddy mode (panel behind the
    # argos-owned Caddy with TLS), layer the override file:
    #   docker compose -f docker-compose.yml -f docker-compose.behind-caddy.yml up -d
    # The override !resets this ports list so :8080 is not published
    # to the host; Caddy reaches argos via the internal argos_net
    # bridge by service name (argos:8080).
    ports:
      - "8080:8080"
    environment:
      - ARGOS_LISTEN=:8080
      - ARGOS_DB_PATH=/data/argos.db
      - ARGOS_CADDY_ADMIN=http://caddy:2019
      - ARGOS_CADDY_TLS_DIAL=caddy:443
      - ARGOS_LOG_LEVEL=info
      - ARGOS_SESSION_SECRET=${ARGOS_SESSION_SECRET:?set ARGOS_SESSION_SECRET in .env}
      - ARGOS_MASTER_KEY=${ARGOS_MASTER_KEY:?set ARGOS_MASTER_KEY in .env (openssl rand -hex 32)}
      - ARGOS_INITIAL_ADMIN_USER=${ARGOS_INITIAL_ADMIN_USER:-admin}
      - ARGOS_INITIAL_ADMIN_PASSWORD=${ARGOS_INITIAL_ADMIN_PASSWORD:-}
      # Phase 9b: ARGOS_PANEL_MODE drives cookie Secure flag, HSTS/
      # CSP headers, and (in behind_caddy) the auto-bootstrap of the
      # panel host row. The override compose file sets these; keeping
      # the default here means LAN mode "just works".
      - ARGOS_PANEL_MODE=${ARGOS_PANEL_MODE:-lan}
      - ARGOS_PANEL_DOMAIN=${ARGOS_PANEL_DOMAIN:-}
      # Forwarded to Caddy via the generated config; the backend itself
      # does not call the Cloudflare API, but keeps it available for
      # future validation hooks (and mirrors caddy's environment).
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:-}
      # Phase 7: CrowdSec integration. The bouncer key is read-only
      # and drives the caddy bouncer + the panel's decisions view.
      # The machine user/password lets the panel POST / DELETE
      # decisions (manual ban / whitelist from the UI).
      - CROWDSEC_LAPI_URL=${CROWDSEC_LAPI_URL:-http://crowdsec:8081}
      - CROWDSEC_BOUNCER_API_KEY=${CROWDSEC_BOUNCER_API_KEY:-}
      - CROWDSEC_PANEL_MACHINE_USER=${CROWDSEC_PANEL_MACHINE_USER:-}
      - CROWDSEC_PANEL_MACHINE_PASSWORD=${CROWDSEC_PANEL_MACHINE_PASSWORD:-}
    volumes:
      - argos_data:/data
      # Caddy's access.log + errors.log; argos only reads them.
      - caddy_logs:/var/log/caddy:ro
      # Phase 9a: backup/restore reads caddy TLS storage (certs + ACME
      # account) read-only so the backup tar.gz captures it. Restore
      # does NOT write into this volume; Caddy re-obtains certs via
      # DNS-01 after the panel restarts.
      - caddy_data:/data/caddy:ro
      # Phase 9a: dedicated named volume for tar.gz files. Kept
      # separate from argos_data so the operator can point rclone /
      # external backup tooling at just this volume.
      - argos_backups:/data/backups
    depends_on:
      caddy:
        condition: service_healthy
      crowdsec:
        condition: service_healthy
    networks:
      - argos_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
    # Phase 9b resource limits. Tune via .env.
    mem_limit: ${ARGOS_MEM_LIMIT:-512m}
    cpus: ${ARGOS_CPU_LIMIT:-1.0}

volumes:
  caddy_data:
    name: argos_caddy_data
  caddy_config:
    name: argos_caddy_config
  caddy_logs:
    name: argos_caddy_logs
  argos_data:
    name: argos_panel_data
  argos_backups:
    name: argos_panel_backups
  crowdsec_config:
    name: argos_crowdsec_config
  crowdsec_data:
    name: argos_crowdsec_data

networks:
  argos_net:
    name: argos_net
    driver: bridge
